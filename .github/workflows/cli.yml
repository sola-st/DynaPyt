name: CLI Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          
      - name: Install DynaPyt
        run: |
          pip install .
          
      - name: Run CLI Test
        run: |
          mkdir -p test_cli/output
          python -m dynapyt.cli \
            --project-root test_cli/test_project \
            --analysis test_cli/analysis/analysis.txt \
            --output-dir test_cli/output \
            python main.py
            
      - name: Verify Output
        run: |
          if [ ! -f "test_cli/output/output.txt" ]; then
            echo "Output file not found!"
            exit 1
          fi
          if ! grep -q "Call at" test_cli/output/output.txt; then
            echo "Expected content not found in output file!"
            exit 1
          fi
          echo "CLI test passed successfully."
